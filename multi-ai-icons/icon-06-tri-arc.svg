<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- iOS squircle mask (rx ≈ 22.37%) -->
    <clipPath id="squircle">
      <rect x="0" y="0" width="1024" height="1024" rx="229" ry="229"/>
    </clipPath>

    <!-- Background: deep graphite with a faint top-center bloom -->
    <radialGradient id="bg" cx="50%" cy="22%" r="80%">
      <stop offset="0%" stop-color="#262633"/>
      <stop offset="55%" stop-color="#101018"/>
      <stop offset="100%" stop-color="#04040a"/>
    </radialGradient>

    <!-- Top gloss for iOS 26 glass feel -->
    <linearGradient id="gloss" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="white" stop-opacity="0.12"/>
      <stop offset="40%" stop-color="white" stop-opacity="0"/>
    </linearGradient>

    <!-- Arc gradients: each has a brighter highlight at top -->
    <linearGradient id="arcClaude" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#FF8248"/>
      <stop offset="55%" stop-color="#FF7536"/>
      <stop offset="100%" stop-color="#DC6438"/>
    </linearGradient>
    <linearGradient id="arcCursor" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#4ED4FE"/>
      <stop offset="55%" stop-color="#20BEFC"/>
      <stop offset="100%" stop-color="#3196D2"/>
    </linearGradient>
    <linearGradient id="arcCodex" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#AB87FE"/>
      <stop offset="55%" stop-color="#8E63FB"/>
      <stop offset="100%" stop-color="#6E54C8"/>
    </linearGradient>

    <!-- Soft glow for each arc -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8"/>
    </filter>

    <!-- Center dot gradient (pearly white) -->
    <radialGradient id="dotG" cx="35%" cy="30%" r="80%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="70%" stop-color="#e6e6ee"/>
      <stop offset="100%" stop-color="#b8b8c4"/>
    </radialGradient>
  </defs>

  <!-- Everything clipped to the squircle so it looks correct outside iOS too -->
  <g clip-path="url(#squircle)">
    <!-- Background -->
    <rect width="1024" height="1024" fill="url(#bg)"/>

    <!-- Subtle radial vignette to push center forward -->
    <rect width="1024" height="1024" fill="black" fill-opacity="0.25"
          style="mask: radial-gradient(circle at 50% 50%, transparent 30%, black 75%);"/>

    <!-- Three concentric C arcs (outer → inner: Claude / Cursor / Codex) -->
    <g stroke-linecap="round" fill="none">
      <!-- Glow layers -->
      <path d="M 810.44 310.76 A 360 360 0 1 0 810.44 713.24"
            stroke="#D97757" stroke-opacity="0.28" stroke-width="72" filter="url(#glow)"/>
      <path d="M 744.12 355.48 A 280 280 0 1 0 744.12 668.52"
            stroke="#4FC0F5" stroke-opacity="0.28" stroke-width="72" filter="url(#glow)"/>
      <path d="M 677.80 400.20 A 200 200 0 1 0 677.80 623.80"
            stroke="#A78BFA" stroke-opacity="0.28" stroke-width="72" filter="url(#glow)"/>

      <!-- Main arcs -->
      <path d="M 810.44 310.76 A 360 360 0 1 0 810.44 713.24"
            stroke="url(#arcClaude)" stroke-width="64"/>
      <path d="M 744.12 355.48 A 280 280 0 1 0 744.12 668.52"
            stroke="url(#arcCursor)" stroke-width="64"/>
      <path d="M 677.80 400.20 A 200 200 0 1 0 677.80 623.80"
            stroke="url(#arcCodex)" stroke-width="64"/>

    </g>

    <!-- Center pearl -->
    <circle cx="512" cy="512" r="42" fill="url(#dotG)"/>
    <circle cx="500" cy="498" r="14" fill="white" fill-opacity="0.85"/>

    <!-- iOS 26 top gloss -->
    <rect width="1024" height="1024" fill="url(#gloss)"/>

    <!-- Inner 1px stroke for crispness -->
    <rect x="0.5" y="0.5" width="1023" height="1023" rx="228.5" ry="228.5"
          fill="none" stroke="white" stroke-opacity="0.06"/>
  </g>
</svg>
