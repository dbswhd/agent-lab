# Agent Lab CI: PR/push (fast, mock-only) + nightly macOS bundle smoke.
name: ci

on:
  push:
    branches: [main, master]
  pull_request:
  schedule:
    # 06:00 UTC daily — bundled runtime + relocation smoke (macOS only).
    - cron: "0 6 * * *"
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test (ubuntu)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux Tauri dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libglib2.0-dev \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install Python package
        run: pip install -e ".[cursor,test,dev]"

      - name: Ruff lint (gate)
        run: ruff check src/ app/ tests/ scripts/

      - name: Ruff format (gate)
        run: ruff format --check src/ app/ tests/ scripts/ examples/

      - name: Mypy ratchet (gate — room.py excluded until split)
        run: python scripts/mypy_ratchet.py --check

      - name: Mypy full report (non-blocking)
        continue-on-error: true
        run: mypy

      - name: Prepare mock test environment
        run: |
          git config --global user.email "ci@agent-lab.local"
          git config --global user.name "Agent Lab CI"
          mkdir -p .venv/bin
          cat > .venv/bin/codex <<'EOF'
          #!/usr/bin/env sh
          echo "codex mock 0.0.0"
          EOF
          chmod +x .venv/bin/codex

      - name: Pytest (PR fast path — mock-only, no secrets)
        env:
          AGENT_LAB_ROOT: ${{ github.workspace }}
        run: pytest tests/ -q -m "not live and not integration" -n auto

      - name: Regression smoke and score fixtures
        run: |
          python scripts/smoke_room.py
          python scripts/check_worktree_orphans.py
          python scripts/score_session.py --json sessions/_regression/worktree_merge_ok
          python scripts/score_session.py --json sessions/_regression/objection_blocks_execute

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Build web frontend
        run: |
          cd web
          npm ci
          npm run lint
          npm run build

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: web/src-tauri

      - name: Prepare Tauri resource stubs
        run: mkdir -p web/src-tauri/bundled-runtime/venv

      - name: Cargo check (Tauri)
        run: cargo check
        working-directory: web/src-tauri

  nightly-bundle:
    name: nightly bundle smoke (macos)
    # Scheduled + manual only — not on every PR (needs prepare-bundled-runtime).
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: macos-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install Python package
        run: pip install -e ".[cursor]"

      - name: Prepare bundled Python runtime
        run: make prepare-bundled-runtime

      - name: Verify bundled venv imports API
        run: |
          VENV="web/src-tauri/bundled-runtime/venv/bin/python"
          test -x "$VENV"
          AGENT_LAB_ROOT="$PWD" "$VENV" -c "import app.server.main"
          "$VENV" -c "import cursor_sdk"

      - name: Check cursor-sdk-bridge in bundled venv
        run: |
          BRIDGE="web/src-tauri/bundled-runtime/venv/bin/cursor-sdk-bridge"
          test -f "$BRIDGE" || test -x "$BRIDGE"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Build web (for runtime/web/dist resource map)
        run: |
          cd web
          npm ci
          npm run build

      # Full DMG/.app packaging is manual (`make tauri-build`); nightly only validates runtime tree.
