# pre_scribe = ["./scripts/hooks/pre-scribe.sh"]
# pre_dispatch = ["./scripts/hooks/pre-dispatch.sh"]
# post_dispatch = ["./scripts/hooks/post-dispatch.sh"]

[hooks.cursor]
